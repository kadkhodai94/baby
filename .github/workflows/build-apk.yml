name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show repo files
        run: |
          echo "Files in repository:"
          ls -la

      - name: Extract Android project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "kids_alphabet_fa_android_studio*.zip" -print | sort -V | tail -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No Android project ZIP file found."
            exit 1
          fi

          echo "ZIP file found: $ZIP_FILE"

          rm -rf kids_alphabet_fa
          unzip -q "$ZIP_FILE"

          echo "Files after unzip:"
          ls -la
          ls -la kids_alphabet_fa

      - name: Build Debug APK
        run: gradle -p kids_alphabet_fa assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kids-alphabet-fa-v5-debug-apk
          path: kids_alphabet_fa/app/build/outputs/apk/debug/*.apk
